# =============================================================================
# COMPOSITE nginx.conf  (generated for the Custom-VPS-MCP-Engine)
# =============================================================================
#
# This is a NEW, composite configuration derived from the existing
# vps-docs/nginx.conf. The reference file was NOT modified.
#
# Everything from the reference is preserved verbatim. The ONLY additions are
# the two new location blocks at the end of the :443 server block:
#     location /sse       -> the long-lived MCP Server-Sent Events stream (GET)
#     location /message   -> the MCP client->server message channel (POST)
# Both proxy to the go-mcp container at 172.255.255.6:8080.
#
# Why the SSE blocks need special directives (do NOT copy the generic proxy
# settings used by the other services):
#   * proxy_http_version 1.1 + `Connection ""`  -> SSE requires an HTTP/1.1
#       persistent connection; clearing the Connection header prevents Nginx
#       from sending "close" and terminating the stream.
#   * proxy_buffering off + proxy_cache off      -> events must flow to the
#       client the instant the server emits them; buffering would batch/delay
#       (or entirely stall) the stream.
#   * proxy_read_timeout / proxy_send_timeout 24h -> streams are intentionally
#       long-lived; the default 60s timeout would sever idle-but-open sessions.
#   * Authorization passthrough                  -> the bearer token must reach
#       the MCP auth middleware unchanged.
# =============================================================================

# using socket config from https://www.theparsedweb.com/production-ready-setup-with-nginx-flask-and-postgres/
user www-data;
pid /run/nginx.pid;
worker_processes auto;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    use               epoll;
}

http {
    include /etc/nginx/mime.types;
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  15;

    # Per-client-IP connection accounting for the MCP SSE endpoint (Audit P-3).
    # `$binary_remote_addr` keys the zone on the client IP in a compact form;
    # a 10m zone tracks on the order of ~160k unique IPs. The actual cap is
    # applied per-location via `limit_conn mcp_conn <n>` (see /sse below).
    limit_conn_zone $binary_remote_addr zone=mcp_conn:10m;

    server {
        listen 80;
        listen [::]:80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl default_server;

        proxy_intercept_errors off;

        ssl_certificate /etc/ssl/api_thirdeye_live.pem;
        ssl_certificate_key /etc/ssl/private/api_thirdeye_live.key;

        location / {
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Host $host;
            proxy_pass          http://172.255.255.4:5000;
        }

        location /image {
            alias /usr/share/nginx/html/image/;
            autoindex off;
        }

        location ~* ^/(quotes|all-authors|search|get-quote|post-quote|update-quote|delete-quote|author-quotes) {
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Host $host;
            proxy_pass          http://172.255.255.4:5000;
        }

        location /quote {
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Host $host;
            proxy_set_header    content-type "application/json";
            proxy_pass          http://172.255.255.3:8080/quote;
        }

        location /quote/search {
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Host $host;
            proxy_set_header    content-type "application/json";
            proxy_pass          http://172.255.255.3:8080/quote/search;
        }

        location /authors {
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Host $host;
            proxy_set_header    content-type "application/json";
            proxy_pass          http://172.255.255.3:8080/authors;
        }

        location /admin/tokens {
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Host $host;
            proxy_set_header    content-type "application/json";
            proxy_pass          http://172.255.255.3:8080/admin/tokens;
        }

        location /tarot/card {
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Host $host;
            proxy_set_header    content-type "application/json";
            proxy_pass          http://172.255.255.3:8080/tarot/card;
        }

        location /tarot/deck {
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Host $host;
            proxy_set_header    content-type "application/json";
            proxy_pass          http://172.255.255.3:8080/tarot/deck;
        }

        location /tarot/decks {
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Host $host;
            proxy_set_header    content-type "application/json";
            proxy_pass          http://172.255.255.3:8080/tarot/decks;
        }

        location /tarot/spread {
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    Host $host;
            proxy_set_header    content-type "application/json";
            proxy_pass          http://172.255.255.3:8080/tarot/spread;
        }

        # =====================================================================
        # NEW: Custom-VPS-MCP-Engine — MCP over HTTPS + Server-Sent Events
        # =====================================================================
        #
        # The MCP transport has two legs; both proxy to the go-mcp container
        # (172.255.255.6:8080). Nginx forwards the query string (e.g. the
        # `?sessionid=...` correlator on /message) automatically.

        # ---- SSE stream leg (GET): the long-lived server->client event feed --
        location /sse {
            proxy_pass          http://172.255.255.6:8080;

            # Cap concurrent SSE streams per client IP (Audit P-3). Each open
            # /sse connection holds a goroutine and an upstream socket, so this
            # prevents a single client from exhausting server/proxy resources.
            limit_conn          mcp_conn 16;

            # Do NOT log SSE requests (Audit P-2). The `?token=` query-parameter
            # auth fallback would otherwise be written to the access log in
            # cleartext, leaking the shared secret to disk.
            access_log          off;

            # Persistent HTTP/1.1 upstream connection — mandatory for SSE.
            proxy_http_version  1.1;
            proxy_set_header    Connection "";

            # Standard forwarding headers.
            proxy_set_header    Host $host;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;

            # Forward the bearer token to the MCP auth middleware unchanged.
            proxy_set_header    Authorization $http_authorization;

            # Stream, do not buffer or cache — deliver events immediately.
            proxy_buffering     off;
            proxy_cache         off;
            chunked_transfer_encoding on;

            # Keep long-lived streams open (default is 60s).
            proxy_read_timeout  24h;
            proxy_send_timeout  24h;
        }

        # ---- Message leg (POST): client->server JSON-RPC messages -----------
        location /message {
            proxy_pass          http://172.255.255.6:8080;

            # Do NOT log message requests (Audit P-2): the `?token=` fallback and
            # the `?sessionid=` correlator would otherwise be persisted to disk.
            access_log          off;

            proxy_http_version  1.1;
            proxy_set_header    Connection "";

            proxy_set_header    Host $host;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;

            # Forward the bearer token (header channel) to the auth middleware.
            proxy_set_header    Authorization $http_authorization;

            # Disable buffering/caching so responses are not held back, and
            # extend timeouts to match the SSE leg for consistency.
            proxy_buffering     off;
            proxy_cache         off;
            proxy_read_timeout  24h;
            proxy_send_timeout  24h;
        }

    }

}
