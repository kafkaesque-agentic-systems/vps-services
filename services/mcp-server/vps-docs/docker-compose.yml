version: "3"

services:
  reverse-proxy:
    image: nginx:latest
    restart: always
    container_name: quotes-proxy
    depends_on:
      - web
      - api
    volumes:
      - /etc/ssl:/etc/ssl:ro
      - ./prx/nginx.conf:/etc/nginx/nginx.conf
      - ./prx/image:/usr/share/nginx/html/image:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      quotes:
        ipv4_address: 172.255.255.5

  web:
    image: quotes-frontend:latest
    container_name: quotes-frontend
    build:
      context: ./web
    # restart: on-failure
    environment:
      - MAILSERVER
      - MAILPASS
      - AUTHORIZED
      - MONGO_INITDB_ROOT_PASSWORD
      - MONGO_INITDB_ROOT_USERNAME
    links:
      - api
    depends_on:
      - api
    volumes:
      - /etc/ssl:/etc/ssl:ro
    ports:
      - "5000:5000"
    networks:
      quotes:
        ipv4_address: 172.255.255.4

  api:
    image: quotes-server:latest
    container_name: quotes-server
    build:
      context: ./api
    # restart: on-failure
    environment:
      - MONGO_INITDB_ROOT_PASSWORD
      - MONGO_INITDB_ROOT_USERNAME
      - MONGO_DATABASE
      - ADMIN_ID
    links:
      - dbs
    depends_on:
      - dbs
    volumes:
      - /etc/ssl:/etc/ssl:ro
    ports:
      - "8080:8080"
    networks:
      quotes:
        ipv4_address: 172.255.255.3

  dbs:
    image: mongo:4.4.18
    container_name: quotes-database
    # restart: always
    environment:
      - MONGO_INITDB_ROOT_PASSWORD
      - MONGO_INITDB_ROOT_USERNAME
    ports:
      - "27017:27017"
    networks:
      quotes:
        ipv4_address: 172.255.255.2
    volumes:
      - quotes-api:/data/db

networks:
  quotes:
    ipam:
      driver: default
      config:
        - subnet: 172.255.255.0/24

volumes:
  quotes-api:
    external: true

